name: 🚀 Deploy

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  actions: write
  contents: read

jobs:
  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.2

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: 🔬 Lint
        run: bun run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.2

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: 🔎 Type check
        run: bun run typecheck

  build:
    name: 🐳 Build
    uses: ./.github/workflows/build.yml   # Pas de @version ici pour workflow local
    secrets: inherit

  deploy:
    name: 🚀 Deploy
    runs-on: self-hosted
    needs: [lint, typecheck, build]

    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

    steps:
      - name: 🚀 Deploy container
        run: |
          docker pull mouctarlawan/portfolio-mac:production

          docker stop portfolio-mac || true
          docker rm portfolio-mac || true

          docker run -d \
            --name portfolio-mac \
            -p 3000:80 \
            mouctarlawan/portfolio-mac:production

          docker system prune -f