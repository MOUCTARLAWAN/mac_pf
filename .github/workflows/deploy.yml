name: 🚀 Deploy

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  actions: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Force Node.js 24 pour les actions

jobs:
  build:
    name: 🐳 Build
    uses: ./.github/workflows/build.yml  # Workflow local, pas de version
    secrets: inherit

  deploy:
    name: 🚀 Deploy
    runs-on: [self-hosted]
    needs: [build]
    # only build/deploy main branch on pushes
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    # env:
    #   APP_ENV: ${{ secrets.APP_ENV }}

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4.1.1 

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Run Docker Compose on Production
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
        run: |
          docker pull mouctarlawan/portfolio-mac:production
          docker run -p 3000:3000 -d mouctarlawan/portfolio-mac:production
          docker system prune --all --volumes --force