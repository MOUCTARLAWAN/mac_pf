name: 🚀 Deploy

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  actions: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Force Node.js 24 pour toutes les actions

jobs:
  # ───────────── Lint ─────────────
  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v4

      - name: Install dependencies
        run: bun install

      - name: 🔬 Lint
        run: bun run lint

  # ───────────── TypeCheck ─────────────
  
  # ───────────── Build Docker Image ─────────────
  build:
    name: 🐳 Build
    uses: ./.github/workflows/build.yml  # Workflow local, pas besoin de version
    secrets: inherit
    needs: [lint, typecheck]

  # ───────────── Deploy ─────────────
  deploy:
    name: 🚀 Deploy
    runs-on: self-hosted
    needs: [build]
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    env:
      APP_ENV: ${{ secrets.APP_ENV }}
    
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Run Docker Compose on Production
        run: |
          docker pull mouctarlawan/portfolio-mac:production

          docker stop portfolio-mac || true
          docker rm portfolio-mac || true

          docker run -d \
            --name portfolio-mac \
            -p 3000:80 \
            mouctarlawan/portfolio-mac:production

          docker system prune --all --volumes --force