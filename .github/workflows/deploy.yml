name: 🚀 Deploy Docker Container

on:
  workflow_dispatch: # permet de lancer manuellement après build
  push:
    branches:
      - main

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    name: Deploy on Server
    runs-on: self-hosted
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🧑‍💻 Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Deploy Docker Container
        run: |
          docker pull mouctarlawan/portfolio-mac:production

          # Stop & remove old container si existant
          docker stop portfolio-mac || true
          docker rm portfolio-mac || true

          # Run nouveau container
          docker run -d \
            --name portfolio-mac \
            -p 3000:80 \
            mouctarlawan/portfolio-mac:production

          # Nettoyer les images et volumes inutilisés
          docker system prune -f