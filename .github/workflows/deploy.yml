name: 🚀 Deploy

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  actions: write
  contents: read

jobs:
  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: styfle/cancel-workflow-action@v1
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: styfle/cancel-workflow-action@0.12.1
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck

  build:
    name: 🐳 Build
    uses: ./.github/workflows/build.yml@main
    secrets: inherit

  deploy:
    name: 🚀 Deploy
    runs-on: self-hosted
    needs: [lint, typecheck, build]

    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

    steps:
      - name: Deploy container
        run: |
          docker pull mouctarlawan/portfolio-mac:production

          docker stop portfolio-mac || true
          docker rm portfolio-mac || true

          docker run -d \
            --name portfolio-mac \
            -p 3000:80 \
            mouctarlawan/portfolio-mac:production

          docker system prune -f